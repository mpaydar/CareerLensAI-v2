# Deploy llm_layer (FastAPI + SpaCy + Whisper) to Azure Web App snapResume
# https://github.com/Azure/webapps-deploy

name: Build and deploy Python app to Azure Web App - snapResume

on:
  push:
    branches:
      - main
    paths:
      - "llm_layer/**"
      - ".github/workflows/main_snapresume.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate llm_layer install
        working-directory: llm_layer
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Package llm_layer for deployment
        run: |
          mkdir -p _azure_deploy
          rsync -a \
            --exclude '.venv' \
            --exclude 'antenv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache' \
            llm_layer/ _azure_deploy/
          chmod +x _azure_deploy/startup.sh

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: _azure_deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: snapResume
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_1C8C8CB938C1472FB08DC5AD6753E946 }}
