# LEGACY: Azure snapResume deploy (disabled — LLM layer uses Google Cloud Run).
# Re-enable push trigger here if you need Azure again.

name: Build and deploy Python app to Azure Web App - snapResume

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate Azure-sized install (no Whisper/torch)
        working-directory: llm_layer
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install --upgrade pip
          pip install -r requirements-azure.txt

      - name: Package llm_layer for deployment
        run: |
          mkdir -p _azure_deploy
          rsync -a \
            --exclude '.venv' \
            --exclude 'antenv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache' \
            llm_layer/ _azure_deploy/
          # Oryx reads requirements.txt — use slim deps to avoid disk full (torch/CUDA).
          cp llm_layer/requirements-azure.txt _azure_deploy/requirements.txt
          chmod +x _azure_deploy/startup.sh

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: _azure_deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: snapResume
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_1C8C8CB938C1472FB08DC5AD6753E946 }}
